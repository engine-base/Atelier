<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'" />
    <title>Atelier Bridge</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0f172a;
        --fg: #fefcf8;
        --accent: #7c3aed;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        max-width: 640px;
        padding: 32px 40px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }
      h1 { font-size: 28px; margin: 0 0 8px; }
      p { line-height: 1.7; opacity: 0.9; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
      .accent { color: var(--accent); font-weight: 600; }
      .meta { margin-top: 24px; font-size: 13px; opacity: 0.7; }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <h1>Atelier Bridge</h1>
      <p>
        Claude Code マルチセッション dispatcher の <span class="accent">最小ブートストラップ</span> です。
        配布パイプライン (electron-builder → AppImage / .deb / .dmg / .msi) を実走確認するための
        プレースホルダー UI で、Vibeyard fork (xterm.js + node-pty) 取り込み後に terminal
        multiplexer に置き換わります (T-F-28 以降)。
      </p>
      <p class="meta">
        dispatcher capacity: <code id="capacity">?</code> ・
        version: <code id="version">?</code>
      </p>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      document.getElementById('capacity').textContent = params.get('capacity') ?? '5';
      document.getElementById('version').textContent = '0.1.0';
    </script>
  </body>
</html>
