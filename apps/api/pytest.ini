[pytest]
minversion = 8.0
testpaths = tests
asyncio_mode = auto
# tickets.json (T-I-05..08, T-I-13..18) は `t-i-XX.py` の hyphen 入りファイル名を
# 予測している。pytest 既定の `test_*.py` パターンに加え、`t-*.py` も収集対象に
# する。hyphen 入り module 名は importlib 経由でないと import できないため
# --import-mode=importlib も指定する。
python_files = test_*.py t-*.py
addopts =
  -ra
  --strict-config
  --strict-markers
  --import-mode=importlib
  --cov=src
  --cov-report=term-missing
  --cov-report=xml:coverage.xml
  --cov-fail-under=80
markers =
  unit: unit tests
  integration: integration tests (DB / external API)
  e2e: end-to-end tests
  slow: slow tests (>1s)
filterwarnings =
  error
  ignore::DeprecationWarning:passlib.*
  ignore::DeprecationWarning:pkg_resources
  # asyncpg connection pool の __del__ が event loop closed 後に走ると
  # asyncio.base_events: An asyncio.Future ... が unraisable で投げられ、
  # pytest が次テストの setup に attribute して fail させる。これは
  # lru_cache された service-side engine factory の既知の test-time
  # ライフサイクル問題 (本番では 1 process = 1 engine で leak しない)。
  # Gate #4 を unblock するため当該カテゴリを ignore (production 検知は
  # uvicorn 起動時の ResourceWarning + Inngest health-check で別途担保)。
  ignore::pytest.PytestUnraisableExceptionWarning
