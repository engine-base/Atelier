[pytest]
minversion = 8.0
testpaths = tests
asyncio_mode = auto
addopts =
  -ra
  --strict-config
  --strict-markers
  --cov=src
  --cov-report=term-missing
  --cov-report=xml:coverage.xml
  --cov-fail-under=80
markers =
  unit: unit tests
  integration: integration tests (DB / external API)
  e2e: end-to-end tests
  slow: slow tests (>1s)
filterwarnings =
  error
  ignore::DeprecationWarning:passlib.*
  ignore::DeprecationWarning:pkg_resources
