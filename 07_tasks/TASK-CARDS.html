<script>
const D=JSON.parse(document.getElementById('data').textContent);
let MODE='ai';
function el(t,a,h){a=a||{};const e=document.createElement(t);for(const k in a){if(k==='cls')e.className=a[k];else e.setAttribute(k,a[k]);}if(h!==undefined)e.innerHTML=h;return e}
function renderSummary(){
  const s=D.summary, sumEl=document.getElementById('summary'); sumEl.innerHTML='';
  const cards = MODE==='ai' ? [
    ['総タスク',s.total_tasks,''],['AI compute',s.total_estimate_hours_ai_compute,'h'],['Wall-clock 並列',s.total_wall_clock_h_ai_parallel,'h'],
    ['人間 review',s.human_review_total_h,'h'],['営業日',s.calendar_days_ai,'日'],['短縮率',s.ai_acceleration_factor_overall,'×']
  ] : [
    ['総タスク',s.total_tasks,''],['Human 総工数',s.total_estimate_hours_human,'h'],['営業日',s.calendar_days_human,'日'],
    ['並列度','1','人'],['短縮率','baseline',''],['カレンダー','~8','ヶ月']
  ];
  for(const [l,v,u] of cards) sumEl.append(el('div',{cls:'card'},`<div class="lbl">${l}</div><div class="v">${v}<small>${u}</small></div>`));
  document.getElementById('hH').textContent = MODE==='ai'?'AI h':'Human h';
  document.getElementById('hAccel').textContent = MODE==='ai'?'accel':'compute h';
  document.getElementById('hReview').textContent = MODE==='ai'?'review':'wave';
}
function applyFilters(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const fG=document.getElementById('fGroup').value, fL=document.getElementById('fLayer').value;
  const fW=document.getElementById('fWave').value, fE=document.getElementById('fEmp').value, fB=document.getElementById('fBlock').checked;
  const rows=document.getElementById('rows'); rows.innerHTML=''; let n=0;
  for(const t of D.tasks){
    if(fG&&t.group!==fG)continue; if(fL&&t.deliverable_layer!==fL)continue;
    if(fW!==''&&String(t.wave)!==fW)continue; if(fE&&t.assigned_employee!==fE)continue;
    if(fB&&!t.blocking)continue;
    if(q){const hay=(t.id+' '+t.title+' '+(t.screen_ids||[]).join(' ')+' '+(t.entity_ids||[]).join(' ')+' '+(t.feature_ids||[]).join(' ')).toLowerCase(); if(!hay.includes(q))continue;}
    const tr=el('tr',{cls:'layer-'+t.deliverable_layer+(t.blocking?' row-block':'')});
    tr.append(el('td',{cls:'t-id'},(t.blocking?'★ ':'')+t.id));
    tr.append(el('td',{},t.title)); tr.append(el('td',{},t.group)); tr.append(el('td',{},'W'+t.wave));
    tr.append(el('td',{},'<span class="badge b-'+t.deliverable_layer+'">'+t.deliverable_layer+'</span>'));
    tr.append(el('td',{},t.assigned_employee));
    if(MODE==='ai'){
      tr.append(el('td',{cls:'t-h'},t.estimate_hours_ai));
      tr.append(el('td',{cls:'t-h'},t.ai_acceleration_factor+'×'));
      tr.append(el('td',{cls:'t-h'},t.human_review_h>0?'<b>'+t.human_review_h+'h</b>':'–'));
    } else {
      tr.append(el('td',{cls:'t-h'},t.estimate_hours_human));
      tr.append(el('td',{cls:'t-h'},t.estimate_hours_ai));
      tr.append(el('td',{cls:'t-h'},'W'+t.wave));
    }
    tr.append(el('td',{cls:'t-deps'},(t.depends_on||[]).join(', ')||'–'));
    const lp=[]; if((t.screen_ids||[]).length)lp.push('🖥 '+t.screen_ids.join(',')); if((t.entity_ids||[]).length)lp.push('🗃 '+t.entity_ids.join(',')); if((t.feature_ids||[]).length)lp.push('⚙ '+t.feature_ids.join(','));
    tr.append(el('td',{cls:'t-links'},lp.join('<br>')||'–'));
    rows.append(tr); n++;
  }
  document.getElementById('counter').textContent=n+' / '+D.tasks.length;
}
function init(){
  renderSummary();
  const emps=[...new Set(D.tasks.map(t=>t.assigned_employee))].sort();
  const fEmp=document.getElementById('fEmp'); emps.forEach(e=>fEmp.append(el('option',{value:e},e)));
  ['q','fGroup','fLayer','fWave','fEmp','fBlock'].forEach(id=>{document.getElementById(id).addEventListener('input',applyFilters);document.getElementById(id).addEventListener('change',applyFilters);});
  applyFilters();
}
document.getElementById('btnAI').addEventListener('click',()=>{MODE='ai';document.getElementById('btnAI').classList.add('on');document.getElementById('btnHuman').classList.remove('on');renderSummary();applyFilters();});
document.getElementById('btnHuman').addEventListener('click',()=>{MODE='human';document.getElementById('btnHuman').classList.add('on');document.getElementById('btnAI').classList.remove('on');renderSummary();applyFilters();});
init();
</script></body></html>
