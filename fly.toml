# Atelier API — Fly.io configuration (T-F-06)
#
# 紐付けるアプリ: atelier-api-eb (engine-base 個人 org)
# 東京リージョン (NRT) で常駐、auto-stop で idle 時自動停止 → 開発期コスト ~$0/月
# Production URL: https://atelier-api-eb.fly.dev
#
# selected-stack.json#api_hosting = "Fly.io (NRT)"
# 関連: apps/api/src/health.py の /health endpoint を healthcheck に使う

app = "atelier-api-eb"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "30s"

# ─────────────────────────────────────────────────────────
# Build — Paketo Cloud Native Buildpacks 経由で Python ビルド
# (Dockerfile 不要、pyproject.toml + uv lock を Fly.io が自動検知)
# ─────────────────────────────────────────────────────────
[build]
  builder = "paketobuildpacks/builder-jammy-base"
  buildpacks = ["gcr.io/paketo-buildpacks/python"]

[build.args]
  BP_CPYTHON_VERSION = "3.12"
  BP_POETRY_INSTALL_GROUPS = "main"

# ─────────────────────────────────────────────────────────
# Environment — non-secret env vars (secrets は flyctl secrets で投入済)
# ─────────────────────────────────────────────────────────
[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"
  APP_ENV = "production"
  LOG_LEVEL = "info"

# ─────────────────────────────────────────────────────────
# HTTP service — port 8000 で uvicorn 起動
# ─────────────────────────────────────────────────────────
[http_service]
  internal_port = 8000
  force_https = true
  # 暴走防止 + コスト最小化:
  #   - auto_stop_machines = "stop" : 5 分 idle で machine 完全停止 (課金 $0)
  #   - auto_start_machines = true   : request 到達時に自動起動 (cold start 1-3 秒)
  #   - min_machines_running = 0     : 完全停止可 (開発期は常に 0)
  #   - max_machines_running = 2     : 想定外の暴走でも最大 2 台に制限
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 2
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

# ─────────────────────────────────────────────────────────
# Healthcheck — apps/api/src/health.py の /health を 30 秒間隔で叩く
# ─────────────────────────────────────────────────────────
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  timeout = "5s"
  path = "/health"
  protocol = "http"

# ─────────────────────────────────────────────────────────
# Processes — app (uvicorn) のみ。Inngest worker は内蔵 (T-F-13)
# ─────────────────────────────────────────────────────────
[processes]
  app = "uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --workers 1"

# ─────────────────────────────────────────────────────────
# VM — 最小スペック (shared-cpu-1x 256MB) で開発期 ~$0、本番は scale up
# ─────────────────────────────────────────────────────────
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
