# Atelier — Production Deploy (T-F-06)
#
# トリガー:
#   - push to main: Fly.io production deploy
#   - workflow_dispatch: 手動 trigger 可
#
# Vercel deploy は Vercel GitHub Integration が自動実行する (vercel.json を
# 認識して preview / production を仕分け)。本 workflow は Fly.io 専用。
#
# 必要な GitHub Secrets:
#   - FLY_API_TOKEN / FLY_APP_NAME
#   - PROD_DATABASE_URL (任意 / 推奨): 本番 DB へ schema migration を自動適用する。
#     未設定なら migration ステップは skip (従来動作)。設定すると deploy 前に
#     SCHEMA_ONLY=1 で冪等適用し、スキーマドリフト (INFRA-3) を恒久的に防ぐ。
#
# v3-gate.yml が PASS している前提 (deploy は merge 後にのみ動く)。

name: deploy

on:
  # main merge 時に Fly.io production deploy を自動実行。
  # 初回 deploy は workflow_dispatch で実機検証済 (https://atelier-api-eb.fly.dev/health 200 OK)。
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "fly.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      app:
        description: "Fly.io app to deploy"
        required: false
        default: ""

# concurrency: 同一ブランチで重複 deploy を抑止する。
concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  fly:
    name: "Fly.io (production)"
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP_NAME: ${{ inputs.app || secrets.FLY_APP_NAME }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Verify required secrets
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$FLY_APP_NAME" ]; then
            echo "::error::FLY_APP_NAME secret is not set"
            exit 1
          fi
          echo "::notice::deploying to app=$FLY_APP_NAME"
      # INFRA-3 恒久対策: 本番 DB スキーマを deploy 前に同期する。
      # スキーマ用 migration は冪等 (if not exists / drop policy if exists) なので
      # 部分適用済みの本番へ再適用しても安全。@verification-only (RLS 越境試験の
      # fixture) は SCHEMA_ONLY=1 で skip し本番を汚さない。
      - name: Apply DB migrations (schema-only)
        if: ${{ env.PROD_DATABASE_URL != '' }}
        env:
          PGURL: ${{ env.PROD_DATABASE_URL }}
          SCHEMA_ONLY: "1"
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi
          bash scripts/ci/apply-migrations.sh
      - name: Deploy
        run: |
          flyctl deploy \
            --app "$FLY_APP_NAME" \
            --remote-only \
            --strategy rolling \
            --wait-timeout 300
      - name: Smoke test /health
        run: |
          sleep 5
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://${FLY_APP_NAME}.fly.dev/health" || echo "000")
          if [ "$status" != "200" ]; then
            echo "::error::Fly.io /health returned $status (expected 200)"
            exit 1
          fi
          echo "::notice::Fly.io /health OK (200)"
