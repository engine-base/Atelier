name: lighthouse

# T-I-09: Lighthouse 性能 + a11y チェック。
# accessibility >= 0.9 を error 必達、performance/best-practices/SEO は warn。
# 重い job なので main への push のみで実行 (PR ごとには走らせない)。

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.run_attempt == 1 }}

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse CWV (5 主要 screen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "9.12.0" }
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Run Lighthouse CI
        run: |
          chmod +x ./scripts/lighthouse-check.sh
          ./scripts/lighthouse-check.sh
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: |
            .lighthouseci/
          if-no-files-found: ignore
