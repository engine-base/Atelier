<script>
const D = JSON.parse(document.getElementById('data').textContent);
let MODE='ai';
function el(t,a,h){a=a||{};const e=document.createElement(t);for(const k in a){if(k==='cls')e.className=a[k];else e.setAttribute(k,a[k]);}if(h!==undefined)e.innerHTML=h;return e;}
function renderSummary(){
  const s=D.summary, sumEl=document.getElementById('summary'); sumEl.innerHTML='';
  const cards = MODE==='ai' ? [
    ['パッケージ',190,''],['AI compute',s.total_estimate_hours_ai_compute,'h'],['Wall-clock',s.total_wall_clock_h_ai_parallel,'h'],
    ['人間 review',s.human_review_total_h,'h'],['営業日',s.calendar_days_ai,'日'],['短縮率',s.ai_acceleration_factor_overall,'×']
  ] : [
    ['パッケージ',190,''],['Human 総工数',s.total_estimate_hours_human,'h'],['営業日',s.calendar_days_human,'日 (~8ヶ月)'],
    ['並列度','1','人'],['短縮率','baseline',''],['受入条件','3-tier','']
  ];
  for(const [l,v,u] of cards) sumEl.append(el('div',{cls:'card'},`<div class="lbl">${l}</div><div class="v">${v}<small>${u}</small></div>`));
  document.getElementById('hH').textContent = MODE==='ai'?'AI h':'Human h';
  document.getElementById('hAccel').textContent = MODE==='ai'?'accel':'wall';
}
function renderGates(){
  const g=document.getElementById('gates'); g.innerHTML='';
  D.ci_gates.forEach(x=>{
    g.append(el('div',{cls:'gate'},`<div class="n">#${x.n}</div><div class="nm">${x.name}</div><div class="th">${x.threshold} · ${x.budget_sec}s</div>`));
  });
}
function renderWaves(){
  const tb=document.getElementById('waveRows'); tb.innerHTML='';
  D.wave_dispatch.forEach(w=>{
    const tr=el('tr');
    tr.append(el('td',{},`<span class="badge w${w.wave}">W${w.wave}</span>`));
    tr.append(el('td',{},w.phase));
    tr.append(el('td',{cls:'t-h'},w.parallel_capacity));
    tr.append(el('td',{},w.start_date)); tr.append(el('td',{},w.end_date));
    tr.append(el('td',{},w.execution==='parallel'?'<span class="badge ok">parallel</span>':'<span class="badge crit">sequential</span>'));
    tb.append(tr);
  });
}
function applyFilters(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const fW=document.getElementById('fWave').value;
  const fE=document.getElementById('fEmp').value;
  const fB=document.getElementById('fBlock').checked;
  const tb=document.getElementById('pkgRows'); tb.innerHTML=''; let n=0;
  for(const p of D.packages){
    if(fW!==''&&String(p.wave)!==fW)continue;
    if(fE&&p.assigned_employee!==fE)continue;
    if(fB&&!p.blocking)continue;
    if(q){const hay=(p.id+' '+p.branch+' '+p.assigned_employee).toLowerCase(); if(!hay.includes(q))continue;}
    const tr=el('tr',p.blocking?{cls:'block'}:{});
    tr.append(el('td',{cls:'t-id'},(p.blocking?'★ ':'')+p.id));
    tr.append(el('td',{cls:'t-branch'},`<code>${p.branch}</code>`));
    tr.append(el('td',{},`<span class="badge w${p.wave}">W${p.wave}</span>`));
    tr.append(el('td',{},p.assigned_employee));
    if(MODE==='ai'){
      tr.append(el('td',{cls:'t-h'},p.estimate_hours_ai));
      tr.append(el('td',{cls:'t-h'},(p.estimate_hours_human/Math.max(p.estimate_hours_ai,0.01)).toFixed(0)+'×'));
      tr.append(el('td',{cls:'t-h'},p.human_review_h>0?'<b>'+p.human_review_h+'h</b>':'–'));
    } else {
      tr.append(el('td',{cls:'t-h'},p.estimate_hours_human));
      tr.append(el('td',{cls:'t-h'},p.wall_clock_h_ai));
      tr.append(el('td',{cls:'t-h'},'–'));
    }
    tr.append(el('td',{},p.blocking?'<span class="badge crit">★</span>':'–'));
    tr.append(el('td',{},`<a href="${p.claude_md_path.replace('09_dispatch/','')}">📄</a>`));
    tb.append(tr); n++;
  }
  document.getElementById('counter').textContent=n+' / '+D.packages.length;
}
function init(){
  renderSummary(); renderGates(); renderWaves();
  const emps=[...new Set(D.packages.map(p=>p.assigned_employee))].sort();
  const fEmp=document.getElementById('fEmp'); emps.forEach(e=>fEmp.append(el('option',{value:e},e)));
  ['q','fWave','fEmp','fBlock'].forEach(id=>{document.getElementById(id).addEventListener('input',applyFilters);document.getElementById(id).addEventListener('change',applyFilters);});
  applyFilters();
}
document.getElementById('btnAI').addEventListener('click',()=>{MODE='ai';document.getElementById('btnAI').classList.add('on');document.getElementById('btnHuman').classList.remove('on');renderSummary();applyFilters();});
document.getElementById('btnHuman').addEventListener('click',()=>{MODE='human';document.getElementById('btnHuman').classList.add('on');document.getElementById('btnAI').classList.remove('on');renderSummary();applyFilters();});
init();
</script></body></html>
