<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ご招待ありがとうございます — Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/atelier.css">
<style>
  body { background: linear-gradient(180deg, var(--color-surface) 0%, var(--color-surface-variant) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 20px; }
  .wrap { max-width: 480px; width: 100%; }
  .top-brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
  .top-brand .brand-mark { width: 36px; height: 36px; font-size: 17px; }
  .top-brand .brand-name { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .greeting-card { background: linear-gradient(135deg, var(--color-primary-container) 0%, var(--color-tertiary-container) 100%); border-radius: var(--rounded-lg); padding: 28px 32px; margin-bottom: 16px; text-align: center; }
  .greet-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-on-primary-container); margin-bottom: 8px; opacity: 0.85; }
  .greet-h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; color: var(--color-on-primary-container); }
  .project-card { background: rgba(255,255,255,0.7); border-radius: var(--rounded-md); padding: 14px 18px; margin-top: 16px; text-align: left; }
  .auth-card { background: #FFFFFF; border: 1px solid var(--color-border); border-radius: var(--rounded-lg); padding: 28px 32px; }
  .consent-row { display: flex; gap: 10px; align-items: flex-start; padding: 12px; background: var(--color-surface-variant); border-radius: var(--rounded-md); margin: 16px 0; }
  .consent-row input { margin-top: 2px; flex-shrink: 0; }
  .footer-note { text-align: center; margin-top: 16px; font-size: 12px; color: var(--color-on-surface-variant); }
  .expiry-bar { display: flex; align-items: center; gap: 8px; justify-content: center; padding: 8px; background: var(--color-secondary-container); color: var(--color-on-secondary-container); border-radius: var(--rounded-md); margin-bottom: 12px; font-size: 12px; }
</style>
</head>
<body>
<main data-bf-screen-id="S-L02" data-bf-screen-name="client_signin" data-bf-category="client_portal" data-bf-status="active" data-bf-version="1">
<div class="wrap">
  <div class="top-brand">
    <div class="brand-mark">A</div>
    <div class="brand-name">Atelier</div>
  </div>

  <div class="greeting-card">
    <div class="greet-eyebrow">Client Portal</div>
    <h1 class="greet-h1">ご招待ありがとうございます</h1>
    <p style="font-size: 13px; opacity: 0.9; color: var(--color-on-primary-container);">高本まさと さんから以下のプロジェクトへ招待されました。</p>
    <div class="project-card">
      <div class="text-sm text-muted">プロジェクト</div>
      <div class="font-bold mb-2" style="font-size: 15px;">小松様 EC モール統合</div>
      <div class="flex items-center gap-2 text-sm">
        <div class="avatar avatar-sm">M</div>
        <span>高本まさと · ENGINE BASE</span>
      </div>
    </div>
  </div>

  <div class="auth-card">
    <div class="expiry-bar">
      <i data-icon="clock" data-size="14"></i>
      <span>このリンクの有効期限は <strong>残り 4 日</strong> です</span>
    </div>

    <h2 style="font-size: 16px; font-weight: 700; margin-bottom: 12px;">クライアントポータルへサインイン</h2>
    <p class="text-sm text-muted mb-4">この招待リンクから、プロジェクトの進捗・成果物・モックを<strong>閲覧・コメント</strong>できます。編集はできません。</p>

    <div class="form-group">
      <label class="form-label">招待先メールアドレス</label>
      <input class="input" value="komatsu@matsuride.com" disabled>
      <div class="input-helper">招待時に指定されたメールアドレスのみサインインできます</div>
    </div>

    <div class="consent-row">
      <input type="checkbox" id="agree-client" checked>
      <label for="agree-client" class="text-sm">
        <a href="../public/S-PUB01-terms.html"><strong>利用規約</strong></a>、<a href="../public/S-PUB02-privacy.html"><strong>プライバシーポリシー</strong></a>、およびデータの一部処理が海外サーバー経由となる<strong>越境同意</strong>に同意します。
      </label>
    </div>

    <div class="consent-row">
      <input type="checkbox" id="confidential" checked>
      <label for="confidential" class="text-sm">
        本プロジェクトのデータ・成果物は<strong>機密情報</strong>として扱い、ENGINE BASE 株式会社・高本まさと様の許諾なく外部に共有しないことに同意します。
      </label>
    </div>

    <button class="btn btn-primary btn-lg w-full" style="justify-content: center;">
      <span>同意してサインイン</span>
      <i data-icon="arrow-right"></i>
    </button>
  </div>

  <p class="footer-note">
    招待リンクに問題がある場合は、招待元へお問い合わせください<br>
    <a href="mailto:masato@engine-base.com">masato@engine-base.com</a>
  </p>
</div>
</main>
<script src="../_shared/icons.js"></script>
</body>
</html>
