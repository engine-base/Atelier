      x-screen-ids: [S-PUB01, S-PUB02, S-PUB03]
      parameters:
        - { name: doc_type, in: path, required: true, schema: { type: string, enum: [terms_of_service, privacy_policy, tokushoho] } }
        - { name: locale, in: query, schema: { type: string, default: ja } }
      responses:
        '200':
          description: 取得
          content:
            application/json:
              schema:
                type: object
