openapi: 3.0.3
info:
  title: Atelier API
  version: 1.0.0
  description: |
    Atelier - AI 社員常駐型開発プロジェクト統合管理 SaaS の API。

    ★ API 契約凍結: 2026-05-20T13:30:00+09:00 ★
    以後の変更は ADR + 影響解析 + 承認フロー必須。

    認証 4 系統:
    - 一般 JWT (Supabase Auth)
    - クライアント別 JWT (role=client_portal, project_id クレーム限定・R-T08 対応)
    - MCP Token
    - Service Role (バックエンド内部 + Bridge worker)
  contact:
    name: ENGINE BASE
    email: info@engine-base.com
  license:
    name: Proprietary

servers:
  - url: https://atelier.app/api/v1
    description: 本番
  - url: https://*.preview.atelier.app/api/v1
    description: Preview Deploy
  - url: http://localhost:8000/api/v1
    description: ローカル開発

tags:
  - name: auth
    description: 認証・サインアップ・退会
  - name: workspaces
    description: ワークスペース管理
  - name: projects
    description: プロジェクト管理
  - name: employees
    description: AI 社員（10 名固定）
  - name: chat
    description: チャット (F-CTX01)
  - name: workflow
    description: 9 工程ワークフロー
  - name: tasks
    description: タスク管理（6 列ライフサイクル）
  - name: kanban-tools
    description: Hermes 互換 kanban tools（Bridge worker 専用）
  - name: executions
    description: 実行モニター・Bridge
  - name: approval-inbox
    description: 承認待ち
  - name: client-portal
    description: クライアント招待（別 JWT 系統）
  - name: knowledge
    description: ナレッジ管理
  - name: admin
    description: 運営（platform_admin 限定）
  - name: public
    description: 公開ページ（法令）
  - name: mcp
    description: MCP Server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    bridgeToken:
      type: apiKey
      in: header
      name: X-Bridge-Token
    clientPortalAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ========================================================================
    # 共通
    # ========================================================================
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum:
                - BAD_REQUEST
                - UNAUTHENTICATED
                - INVALID_CREDENTIALS
                - INVALID_BRIDGE_TOKEN
                - INVALID_INVITATION_TOKEN
                - FORBIDDEN
                - ACCOUNT_LOCKED
                - ACCOUNT_DELETED
                - NOT_FOUND
                - CONFLICT
                - INVALID_LIFECYCLE_STAGE
                - DEPENDENCIES_NOT_MET
                - ALREADY_DECIDED
                - EMAIL_ALREADY_REGISTERED
                - EMAIL_IN_DELETION_GRACE
                - OWNER_OF_WORKSPACE_WITH_OTHERS
                - INVITATION_EXPIRED
                - VALIDATION_ERROR
                - CONSENT_REQUIRED
                - RATE_LIMITED
                - BYOK_QUOTA_EXCEEDED
                - INTERNAL_ERROR
                - BRIDGE_OFFLINE
                - PARALLEL_LIMIT_REACHED
                - F_CTX01_TIMEOUT
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  code: { type: string }
                  message: { type: string }
            request_id: { type: string, format: uuid }
            trace_id: { type: string }

    PaginationMeta:
      type: object
      properties:
        next_cursor: { type: string, nullable: true }
        limit: { type: integer }
        total_estimate: { type: integer }

    # ========================================================================
    # auth
    # ========================================================================
    User:
      type: object
      required: [id, email, display_name, language, ai_learning_opt_out, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, nullable: true }
        language: { type: string, enum: [ja, en] }
        ai_learning_opt_out: { type: boolean, default: true }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SigninRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      required: [user, access_token]
      properties:
        user: { $ref: '#/components/schemas/User' }
        workspace: { $ref: '#/components/schemas/Workspace' }
        access_token: { type: string }
        refresh_token: { type: string, description: "opaque, httpOnly cookie" }

    SigninResponse:
      type: object
      required: [access_token, token_type, expires_at, user_id, email]
      properties:
        access_token: { type: string, description: "HS256 JWT (sub=user.id)" }
        token_type: { type: string, enum: [bearer] }
        expires_at: { type: string, format: date-time }
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string, nullable: true }
        refresh_token: { type: string, nullable: true, description: "opaque refresh token (T-A-04)" }

    # T-A-03: Magic Link + OAuth
    MagicLinkRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        redirect_url: { type: string, maxLength: 500, nullable: true }

    MagicLinkAccepted:
      type: object
      required: [accepted, delivery]
      properties:
        accepted: { type: boolean }
        delivery: { type: string, enum: [email] }

    MagicLinkVerifyRequest:
      type: object
      required: [email, token]
      properties:
        email: { type: string, format: email }
        token: { type: string, minLength: 10, maxLength: 200 }

    OAuthRedirectResponse:
      type: object
      required: [authorize_url, state, provider]
      properties:
        authorize_url: { type: string }
        state: { type: string }
        provider: { type: string, enum: [google, github] }

    # T-A-04: Password Reset + Refresh
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    PasswordResetAccepted:
      type: object
      required: [accepted]
      properties:
        accepted: { type: boolean }

    PasswordResetConfirmRequest:
      type: object
      required: [email, token, new_password]
      properties:
        email: { type: string, format: email }
        token: { type: string, minLength: 10, maxLength: 200 }
        new_password: { type: string, minLength: 8, maxLength: 128 }

    PasswordResetConfirmResponse:
      type: object
      required: [user_id, email, password_changed_at]
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        password_changed_at: { type: string, format: date-time }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, minLength: 10, maxLength: 200 }

    RefreshResponse:
      type: object
      required: [access_token, token_type, expires_at, refresh_token]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [bearer] }
        expires_at: { type: string, format: date-time }
        refresh_token: { type: string, description: "rotated new opaque token" }

    # T-A-05: 退会
    AccountDeleteRequest:
      type: object
      required: [password]
      properties:
        password: { type: string, minLength: 1, maxLength: 128 }
        reason: { type: string, maxLength: 2000, nullable: true }

    AccountDeleteResponse:
      type: object
      required: [user_id, scheduled_purge_at, deleted_at]
      properties:
        user_id: { type: string, format: uuid }
        scheduled_purge_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time }

    AccountRestoreRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1, maxLength: 128 }

    AccountRestoreResponse:
      type: object
      required: [user_id, restored_at]
      properties:
        user_id: { type: string, format: uuid }
        restored_at: { type: string, format: date-time }

    # T-A-45: API 契約凍結
    FreezeRequest:
      type: object
      properties:
        note: { type: string, nullable: true }

    FreezeStatus:
      type: object
      required: [frozen, total_paths, total_methods, evaluated_at]
      properties:
        frozen: { type: boolean }
        frozen_at: { type: string, format: date-time, nullable: true }
        frozen_by_user_id: { type: string, format: uuid, nullable: true }
        last_note: { type: string, nullable: true }
        total_paths: { type: integer, minimum: 0 }
        total_methods: { type: integer, minimum: 0 }
        evaluated_at: { type: string, format: date-time }

    ScreenCoverageEntry:
      type: object
      required: [screen_id, endpoint_count, endpoints]
      properties:
        screen_id: { type: string }
        endpoint_count: { type: integer, minimum: 0 }
        endpoints:
          type: array
          items: { type: string }

    ScreenCoverageReport:
      type: object
      required: [total_screens, covered_screens, uncovered_screens, coverage_pct, entries, evaluated_at]
      properties:
        total_screens: { type: integer, minimum: 0 }
        covered_screens: { type: integer, minimum: 0 }
        uncovered_screens:
          type: array
          items: { type: string }
        coverage_pct: { type: number, minimum: 0, maximum: 100 }
        entries:
          type: array
          items: { $ref: '#/components/schemas/ScreenCoverageEntry' }
        evaluated_at: { type: string, format: date-time }

    # ========================================================================
    # workspace
    # ========================================================================
    Workspace:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        member_count: { type: integer }
        project_count: { type: integer }
        plan: { type: string, enum: [free, pro, enterprise] }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role: { type: string, enum: [owner, member, viewer] }
        message: { type: string, maxLength: 500 }

    # ========================================================================
    # project
    # ========================================================================
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        type: { type: string, enum: [self_product, client_project, personal] }
        status: { type: string, enum: [in_progress, draft, paused, archived] }
        ai_learning_opt_out: { type: boolean }
        current_phase:
          type: string
          enum: [hearing, requirements, architecture, design, breakdown, tasks, implementation, verification, delivery]
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectCredential:
      type: object
      description: プロジェクト・シークレットの1件（plaintext / encrypted は含まない、値マスク）
      required: [id, project_id, name, kind, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string, enum: [api_key, password, token, connection_string, other] }
        last4: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CredentialCreate:
      type: object
      required: [name, value]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        kind: { type: string, enum: [api_key, password, token, connection_string, other] }
        value: { type: string, minLength: 1, maxLength: 10000, description: plaintext（保存時に暗号化） }

    CredentialUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200, nullable: true }
        kind: { type: string, enum: [api_key, password, token, connection_string, other], nullable: true }

    CredentialReveal:
      type: object
      description: reveal 応答（権限者のみ・監査記録済の上で plaintext を返す）
      required: [id, name, value]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        value: { type: string, description: plaintext（復号済） }

    CreateProjectRequest:
      type: object
      required: [workspace_id, name, type]
      properties:
        workspace_id: { type: string, format: uuid }
        name: { type: string, maxLength: 100 }
        type: { type: string, enum: [self_product, client_project, personal] }
        description: { type: string }

    # ========================================================================
    # task
    # ========================================================================
    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        phase: { type: string }
        category: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        type: { type: string, enum: [foundation, screen, feature, verification, infrastructure, migration] }
        estimated_hours: { type: integer, minimum: 1, maximum: 24 }
        priority: { type: string, enum: [critical, high, medium, low] }
        lifecycle_stage:
          type: string
          enum: [triage, ready, in_progress, blocked, awaiting, done]
          description: Hermes 6 列モデル
        dispatch_status:
          type: string
          enum: [queued, spawning, running, completing, dead, reclaimed]
          nullable: true
        assigned_employee_id:
          type: string
          enum: [jarvis, tony, natasha, steve, peter, strange, wanda, thor, vision, tchalla]
        # Hermes 互換
        summary: { type: string, nullable: true }
        metadata: { type: object }
        blocked_reason: { type: string, nullable: true }
        retry_count: { type: integer, minimum: 0, maximum: 3 }
        worktree_path: { type: string, nullable: true }
        worker_pid: { type: integer, nullable: true }
        # 依存関係
        dependencies: { type: array, items: { type: string, format: uuid } }
        prerequisites: { type: array, items: { type: string, format: uuid } }
        blocks: { type: array, items: { type: string, format: uuid } }
        # 紐付け
        acceptance_criteria_id: { type: string, format: uuid, nullable: true }
        mock_id: { type: string, format: uuid, nullable: true }
        # 系譜
        parent_task_id: { type: string, format: uuid, nullable: true }
        origin_type:
          type: string
          enum: [initial_decomposition, refactor, scope_change_auto, manual_added]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AcceptanceCriteria:
      type: object
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        html_path: { type: string }
        items: { type: array, items: { type: object } }
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskExecution:
      type: object
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        score: { type: number, nullable: true }
        ac_pass_rate: { type: number, nullable: true }
        test_pass_rate: { type: number, nullable: true }
        verification_score: { type: number, nullable: true }
        retry_count: { type: integer }
        status: { type: string }
        claude_code_session_id: { type: string, nullable: true }
        logs_storage_path: { type: string, nullable: true }
        error_summary: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Mock:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        screen_name: { type: string }
        html_storage_path: { type: string }
        version: { type: integer }
        parent_mock_id: { type: string, format: uuid, nullable: true }
        meta_tags: { type: object, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ContentUrl:
      type: object
      required: [url]
      properties:
        url: { type: string }

    AiEmployee:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        template_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        display_name: { type: string }
        icon: { type: string, nullable: true }
        role: { type: string, enum: [coo, lead, member] }
        department: { type: string, enum: [executive, sales, product, architecture, design, dev_qa, cross_functional] }
        tone_preset: { type: string, enum: [polite, friendly, casual, concise, coaching] }
        custom_tone_text: { type: string, nullable: true }
        attached_skills: { type: array, items: { type: string, format: uuid } }
        attached_knowledge_cats: { type: array, items: { type: string } }
        is_default: { type: boolean }
        archived: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AiEmployeeTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        default_name: { type: string }
        default_display_name: { type: string }
        default_icon: { type: string, nullable: true }
        department: { type: string, enum: [executive, sales, product, architecture, design, dev_qa, cross_functional] }
        role: { type: string, enum: [coo, lead, member] }
        default_skills: { type: array, items: { type: string, format: uuid } }
        default_knowledge_cats: { type: array, items: { type: string } }
        system_prompt: { type: string }
        specialty: { type: string }
        version: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AuditLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid, nullable: true }
        actor_type: { type: string, enum: [ai, user, system, anonymous] }
        actor_id: { type: string }
        action: { type: string }
        target_type: { type: string }
        target_id: { type: string, format: uuid, nullable: true }
        before: { type: object, nullable: true }
        after: { type: object, nullable: true }
        ip_address: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    AdminSkill:
      type: object
      description: 運営 admin 向け skill 詳細 (T-A-42)。
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        version: { type: string }
        description: { type: string, nullable: true }
        content_md: { type: string }
        assets_storage_path: { type: string, nullable: true }
        allowed_employee_roles: { type: array, items: { type: string } }
        allowed_employee_ids: { type: array, items: { type: string, format: uuid } }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SkillCreate:
      type: object
      description: スキル新規登録（SKILL.md upload, T-A-49 / F-007）。name+version unique・version semver。
      required: [name, version, content_md]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        version: { type: string, minLength: 1, maxLength: 64, description: 'semver (例 1.0.0)' }
        content_md: { type: string, minLength: 1 }
        description: { type: string, nullable: true }
        assets_storage_path: { type: string, nullable: true }
        allowed_employee_roles: { type: array, items: { type: string }, maxItems: 50 }
        allowed_employee_ids: { type: array, items: { type: string, format: uuid }, maxItems: 200 }
        is_active: { type: boolean, default: true }

    SkillUpdate:
      type: object
      description: スキル編集（name/version は不変。新バージョンは create で別行, T-A-49）。
      properties:
        content_md: { type: string, minLength: 1, nullable: true }
        description: { type: string, nullable: true }
        assets_storage_path: { type: string, nullable: true }
        allowed_employee_roles: { type: array, items: { type: string }, maxItems: 50, nullable: true }
        allowed_employee_ids: { type: array, items: { type: string, format: uuid }, maxItems: 200, nullable: true }
        is_active: { type: boolean, nullable: true }

    SkillAttachRequest:
      type: object
      description: AI 社員へのスキル装着 / 解除（T-A-49）。
      required: [ai_employee_id]
      properties:
        ai_employee_id: { type: string, format: uuid }
        attached: { type: boolean, default: true, description: 'true=装着 / false=解除' }

    AdminTemplate:
      type: object
      description: 運営 admin 向け AI 社員テンプレ詳細 (T-A-42)。
      properties:
        id: { type: string, format: uuid }
        default_name: { type: string }
        default_display_name: { type: string }
        default_icon: { type: string, nullable: true }
        department: { type: string }
        role: { type: string }
        default_skills: { type: array, items: { type: string, format: uuid } }
        default_knowledge_cats: { type: array, items: { type: string } }
        system_prompt: { type: string }
        specialty: { type: string }
        version: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AdminDashboard:
      type: object
      description: 運営 admin dashboard 集計 (T-A-41 / admin 所属 workspaces scope)。
      properties:
        workspace_count: { type: integer }
        project_count: { type: integer }
        ai_employee_count: { type: integer }
        audit_log_count_24h: { type: integer }
        generated_at: { type: string, format: date-time }

    AdminUser:
      type: object
      description: 運営 admin 用メンバー詳細 (T-A-41 / workspace_member_details definer 経由)。
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string, nullable: true }
        role: { type: string }
        joined_at: { type: string, format: date-time }
        workspace_id: { type: string, format: uuid }

    ClientInvitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        email: { type: string, format: email }
        scopes: { type: array, items: { type: string } }
        expires_at: { type: string, format: date-time }
        used_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        client_display_name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ClientInvitationWithToken:
      allOf:
