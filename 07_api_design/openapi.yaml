openapi: 3.0.3
info:
  title: Atelier API
  version: 1.0.0
  description: |
    Atelier - AI 社員常駐型開発プロジェクト統合管理 SaaS の API。

    ★ API 契約凍結: 2026-05-20T13:30:00+09:00 ★
    以後の変更は ADR + 影響解析 + 承認フロー必須。

    認証 4 系統:
    - 一般 JWT (Supabase Auth)
    - クライアント別 JWT (role=client_portal, project_id クレーム限定・R-T08 対応)
    - MCP Token
    - Service Role (バックエンド内部 + Bridge worker)
  contact:
    name: ENGINE BASE
    email: info@engine-base.com
  license:
    name: Proprietary

servers:
  - url: https://atelier.app/api/v1
    description: 本番
  - url: https://*.preview.atelier.app/api/v1
    description: Preview Deploy
  - url: http://localhost:8000/api/v1
    description: ローカル開発

tags:
  - name: auth
    description: 認証・サインアップ・退会
  - name: workspaces
    description: ワークスペース管理
  - name: projects
    description: プロジェクト管理
  - name: employees
    description: AI 社員（10 名固定）
  - name: chat
    description: チャット (F-CTX01)
  - name: workflow
    description: 9 工程ワークフロー
  - name: tasks
    description: タスク管理（6 列ライフサイクル）
  - name: kanban-tools
    description: Hermes 互換 kanban tools（Bridge worker 専用）
  - name: executions
    description: 実行モニター・Bridge
  - name: approval-inbox
    description: 承認待ち
  - name: client-portal
    description: クライアント招待（別 JWT 系統）
  - name: knowledge
    description: ナレッジ管理
  - name: admin
    description: 運営（platform_admin 限定）
  - name: public
    description: 公開ページ（法令）
  - name: mcp
    description: MCP Server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    bridgeToken:
      type: apiKey
      in: header
      name: X-Bridge-Token
    clientPortalAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ========================================================================
    # 共通
    # ========================================================================
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum:
                - BAD_REQUEST
                - UNAUTHENTICATED
                - INVALID_CREDENTIALS
                - INVALID_BRIDGE_TOKEN
                - INVALID_INVITATION_TOKEN
                - FORBIDDEN
                - ACCOUNT_LOCKED
                - ACCOUNT_DELETED
                - NOT_FOUND
                - CONFLICT
                - INVALID_LIFECYCLE_STAGE
                - DEPENDENCIES_NOT_MET
                - ALREADY_DECIDED
                - EMAIL_ALREADY_REGISTERED
                - EMAIL_IN_DELETION_GRACE
                - OWNER_OF_WORKSPACE_WITH_OTHERS
                - INVITATION_EXPIRED
                - VALIDATION_ERROR
                - CONSENT_REQUIRED
                - RATE_LIMITED
                - BYOK_QUOTA_EXCEEDED
                - INTERNAL_ERROR
                - BRIDGE_OFFLINE
                - PARALLEL_LIMIT_REACHED
                - F_CTX01_TIMEOUT
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  code: { type: string }
                  message: { type: string }
            request_id: { type: string, format: uuid }
            trace_id: { type: string }

    PaginationMeta:
      type: object
      properties:
        next_cursor: { type: string, nullable: true }
        limit: { type: integer }
        total_estimate: { type: integer }

    # ========================================================================
    # auth
    # ========================================================================
    User:
      type: object
      required: [id, email, display_name, language, ai_learning_opt_out, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, nullable: true }
        language: { type: string, enum: [ja, en] }
        ai_learning_opt_out: { type: boolean, default: true }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SignupRequest:
      type: object
      required: [email, password, display_name, consents]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 8, maxLength: 128 }
        display_name: { type: string, maxLength: 50 }
        consents:
          type: object
          required: [terms, privacy, cross_border]
          properties:
            terms: { type: boolean }
            privacy: { type: boolean }
            cross_border: { type: boolean }
            marketing: { type: boolean }

    SigninRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      required: [user, access_token]
      properties:
        user: { $ref: '#/components/schemas/User' }
        workspace: { $ref: '#/components/schemas/Workspace' }
        access_token: { type: string }
        refresh_token: { type: string, description: "opaque, httpOnly cookie" }

    # ========================================================================
    # workspace
    # ========================================================================
    Workspace:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        member_count: { type: integer }
        project_count: { type: integer }
        plan: { type: string, enum: [free, pro, enterprise] }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role: { type: string, enum: [owner, member, viewer] }
        message: { type: string, maxLength: 500 }

    # ========================================================================
    # project
    # ========================================================================
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        type: { type: string, enum: [self_product, client_project, personal] }
        status: { type: string, enum: [in_progress, draft, paused, archived] }
        ai_learning_opt_out: { type: boolean }
        current_phase:
          type: string
          enum: [hearing, requirements, architecture, design, breakdown, tasks, implementation, verification, delivery]
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateProjectRequest:
      type: object
      required: [workspace_id, name, type]
      properties:
        workspace_id: { type: string, format: uuid }
        name: { type: string, maxLength: 100 }
        type: { type: string, enum: [self_product, client_project, personal] }
        description: { type: string }

    # ========================================================================
    # task
    # ========================================================================
    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        phase: { type: string }
        category: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        type: { type: string, enum: [foundation, screen, feature, verification, infrastructure, migration] }
        estimated_hours: { type: integer, minimum: 1, maximum: 24 }
        priority: { type: string, enum: [critical, high, medium, low] }
        lifecycle_stage:
          type: string
          enum: [triage, ready, in_progress, blocked, awaiting, done]
          description: Hermes 6 列モデル
        dispatch_status:
          type: string
          enum: [queued, spawning, running, completing, dead, reclaimed]
          nullable: true
        assigned_employee_id:
          type: string
          enum: [jarvis, tony, natasha, steve, peter, strange, wanda, thor, vision, tchalla]
        # Hermes 互換
        summary: { type: string, nullable: true }
        metadata: { type: object }
        blocked_reason: { type: string, nullable: true }
        retry_count: { type: integer, minimum: 0, maximum: 3 }
        worktree_path: { type: string, nullable: true }
        worker_pid: { type: integer, nullable: true }
        # 依存関係
        dependencies: { type: array, items: { type: string, format: uuid } }
        prerequisites: { type: array, items: { type: string, format: uuid } }
        blocks: { type: array, items: { type: string, format: uuid } }
        # 紐付け
        acceptance_criteria_id: { type: string, format: uuid, nullable: true }
        mock_id: { type: string, format: uuid, nullable: true }
        # 系譜
        parent_task_id: { type: string, format: uuid, nullable: true }
        origin_type:
          type: string
          enum: [initial_decomposition, refactor, scope_change_auto, manual_added]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AcceptanceCriteria:
      type: object
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        html_path: { type: string }
        items: { type: array, items: { type: object } }
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskExecution:
      type: object
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        score: { type: number, nullable: true }
        ac_pass_rate: { type: number, nullable: true }
        test_pass_rate: { type: number, nullable: true }
        verification_score: { type: number, nullable: true }
        retry_count: { type: integer }
        status: { type: string }
        claude_code_session_id: { type: string, nullable: true }
        logs_storage_path: { type: string, nullable: true }
        error_summary: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Mock:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        screen_name: { type: string }
        html_storage_path: { type: string }
        version: { type: integer }
        parent_mock_id: { type: string, format: uuid, nullable: true }
        meta_tags: { type: object, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AiEmployee:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        template_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        display_name: { type: string }
        icon: { type: string, nullable: true }
        role: { type: string, enum: [coo, lead, member] }
        department: { type: string, enum: [executive, sales, product, architecture, design, dev_qa, cross_functional] }
        tone_preset: { type: string, enum: [polite, friendly, casual, concise, coaching] }
        custom_tone_text: { type: string, nullable: true }
        attached_skills: { type: array, items: { type: string, format: uuid } }
        attached_knowledge_cats: { type: array, items: { type: string } }
        is_default: { type: boolean }
        archived: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AiEmployeeTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        default_name: { type: string }
        default_display_name: { type: string }
        default_icon: { type: string, nullable: true }
        department: { type: string, enum: [executive, sales, product, architecture, design, dev_qa, cross_functional] }
        role: { type: string, enum: [coo, lead, member] }
        default_skills: { type: array, items: { type: string, format: uuid } }
        default_knowledge_cats: { type: array, items: { type: string } }
        system_prompt: { type: string }
        specialty: { type: string }
        version: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AuditLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid, nullable: true }
        actor_type: { type: string, enum: [ai, user, system, anonymous] }
        actor_id: { type: string }
        action: { type: string }
        target_type: { type: string }
        target_id: { type: string, format: uuid, nullable: true }
        before: { type: object, nullable: true }
        after: { type: object, nullable: true }
        ip_address: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    AdminSkill:
      type: object
      description: 運営 admin 向け skill 詳細 (T-A-42)。
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        version: { type: string }
        description: { type: string, nullable: true }
        content_md: { type: string }
        assets_storage_path: { type: string, nullable: true }
        allowed_employee_roles: { type: array, items: { type: string } }
        allowed_employee_ids: { type: array, items: { type: string, format: uuid } }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AdminTemplate:
      type: object
      description: 運営 admin 向け AI 社員テンプレ詳細 (T-A-42)。
      properties:
        id: { type: string, format: uuid }
        default_name: { type: string }
        default_display_name: { type: string }
        default_icon: { type: string, nullable: true }
        department: { type: string }
        role: { type: string }
        default_skills: { type: array, items: { type: string, format: uuid } }
        default_knowledge_cats: { type: array, items: { type: string } }
        system_prompt: { type: string }
        specialty: { type: string }
        version: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AdminDashboard:
      type: object
      description: 運営 admin dashboard 集計 (T-A-41 / admin 所属 workspaces scope)。
      properties:
        workspace_count: { type: integer }
        project_count: { type: integer }
        ai_employee_count: { type: integer }
        audit_log_count_24h: { type: integer }
        generated_at: { type: string, format: date-time }

    AdminUser:
      type: object
      description: 運営 admin 用メンバー詳細 (T-A-41 / workspace_member_details definer 経由)。
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string, nullable: true }
        role: { type: string }
        joined_at: { type: string, format: date-time }
        workspace_id: { type: string, format: uuid }

    ClientInvitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        email: { type: string, format: email }
        scopes: { type: array, items: { type: string } }
        expires_at: { type: string, format: date-time }
        used_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        client_display_name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ClientInvitationWithToken:
      allOf:
        - { $ref: '#/components/schemas/ClientInvitation' }
        - type: object
          properties:
            token: { type: string, description: 生成時のみ返る raw token (招待 URL 用) }

    WorkspaceMember:
      type: object
      properties:
        workspace_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string, nullable: true }
        role: { type: string, enum: [owner, member, viewer] }
        joined_at: { type: string, format: date-time }

    ChatThread:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        ai_employee_id: { type: string, format: uuid }
        title: { type: string, nullable: true }
        archived: { type: boolean }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ChatMessage:
      type: object
      properties:
        id: { type: string, format: uuid }
        thread_id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system, tool] }
        content: { type: string }
        parent_message_id: { type: string, format: uuid, nullable: true }
        token_count: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MessageFeedback:
      type: object
      properties:
        feedback_id: { type: string, format: uuid }
        message_id: { type: string, format: uuid }
        value: { type: string, enum: [up, down] }
        comment: { type: string, nullable: true }
        recorded_at: { type: string, format: date-time }

    Phase:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        order: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [pending, in_progress, completed, skipped] }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    WorkflowOutput:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        phase_id: { type: string, format: uuid, nullable: true }
        stage: { type: string }
        html_path: { type: string, nullable: true }
        json_path: { type: string, nullable: true }
        md_path: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        version: { type: integer }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        target_type: { type: string, enum: [workflow_output, mock, task, acceptance_criteria] }
        target_id: { type: string, format: uuid }
        target_element_id: { type: string, nullable: true }
        author_user_id: { type: string, format: uuid, nullable: true }
        author_invitation_id: { type: string, format: uuid, nullable: true }
        content: { type: string }
        status: { type: string, enum: [open, resolved, deleted] }
        parent_comment_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CronSchedule:
      type: object
      description: cron スケジュール (T-A-40)。project-scoped。Inngest 連動は別途。
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        name: { type: string }
        cron_expression: { type: string }
        target_action: { type: string, enum: [task_replay, knowledge_organize, industry_extract, report_summary, daily_digest, weekly_burndown] }
        target_payload: { type: object }
        enabled: { type: boolean }
        next_run_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    LegalDocument:
      type: object
      properties:
        id: { type: string, format: uuid }
        doc_type: { type: string, enum: [terms_of_service, privacy_policy, tokushoho] }
        version: { type: string }
        locale: { type: string }
        title: { type: string }
        body_md: { type: string }
        effective_date: { type: string, format: date }
        is_current: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DataDeletionRequestResponse:
      type: object
      properties:
        request_id: { type: string, format: uuid }
        status: { type: string }
        requested_at: { type: string, format: date-time }

    ImpactAnalysisResponse:
      type: object
      properties:
        root_task_id: { type: string, format: uuid }
        affected_task_ids: { type: array, items: { type: string, format: uuid } }
        affected_count: { type: integer }

    PlayTaskRequest:
      type: object
      properties:
        force: { type: boolean, default: false }

    PlayTaskResponse:
      type: object
      properties:
        task_id: { type: string, format: uuid }
        lifecycle_stage: { type: string }
        dispatch_status: { type: string }
        execution_id: { type: string, format: uuid }
        worktree_path: { type: string }
        bridge_command: { type: string }
        queue_position: { type: integer, description: "並列上限超過時のキュー位置" }

    TaskBulkLifecycleRequest:
      type: object
      required: [task_ids, target_stage]
      properties:
        task_ids:
          type: array
          minItems: 1
          maxItems: 200
          items: { type: string, format: uuid }
        target_stage:
          type: string
          enum: [triage, ready, in_progress, blocked, awaiting, done]
        note: { type: string, maxLength: 2000, nullable: true }

    TaskBulkLifecycleResponse:
      type: object
      required: [requested, updated, updated_task_ids, skipped_task_ids]
      properties:
        requested: { type: integer, minimum: 0 }
        updated: { type: integer, minimum: 0 }
        updated_task_ids:
          type: array
          items: { type: string, format: uuid }
        skipped_task_ids:
          type: array
          items: { type: string, format: uuid }

    TaskDecisionRequest:
      type: object
      properties:
        note: { type: string, maxLength: 2000, nullable: true }

    SalesDocCreate:
      type: object
      required: [project_id, doc_type]
      properties:
        project_id: { type: string, format: uuid }
        doc_type: { type: string, enum: [proposal, estimate] }
        summary: { type: string, maxLength: 4000, nullable: true }
        html_path: { type: string, maxLength: 500, nullable: true }
        json_path: { type: string, maxLength: 500, nullable: true }
        md_path: { type: string, maxLength: 500, nullable: true }

    SalesDocUpdate:
      type: object
      properties:
        summary: { type: string, maxLength: 4000, nullable: true }
        html_path: { type: string, maxLength: 500, nullable: true }
        json_path: { type: string, maxLength: 500, nullable: true }
        md_path: { type: string, maxLength: 500, nullable: true }

    SalesDoc:
      type: object
      required: [id, project_id, doc_type, version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        phase_id: { type: string, format: uuid, nullable: true }
        doc_type: { type: string, enum: [proposal, estimate] }
        html_path: { type: string, nullable: true }
