          application/json:
            schema: { $ref: '#/components/schemas/SignupRequest' }
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AuthResponse' }
        '409':
          description: メール重複 or 削除猶予中
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: バリデーション失敗 or 同意未取得
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: レート上限
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/signin:
