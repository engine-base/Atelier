      x-screen-ids: [S-A01]
      x-rate-limit: 5/min/ip
      x-feature-ids: [F-001]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SigninRequest' }
      responses:
        '200':
          description: サインイン成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: 認証情報不正
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: アカウントロック or 削除猶予中
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: レート上限
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

