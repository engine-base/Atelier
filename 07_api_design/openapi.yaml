    KanbanCompleteMetadata:
      type: object
      required: [score, ac_pass_rate, test_pass_rate, verification_score]
      properties:
        score: { type: number, minimum: 0, maximum: 1 }
        ac_pass_rate: { type: number, minimum: 0, maximum: 1 }
        test_pass_rate: { type: number, minimum: 0, maximum: 1 }
        verification_score: { type: number, minimum: 0, maximum: 1 }
        retry_count: { type: integer, minimum: 0, maximum: 3, default: 0 }
        files_changed:
          type: array
          items: { type: string }
          maxItems: 500

    KanbanCompleteRequestV2:
      type: object
      required: [task_id, execution_id, summary, metadata]
      properties:
        task_id: { type: string, format: uuid }
        execution_id: { type: string, format: uuid }
        summary: { type: string, minLength: 1, maxLength: 4000 }
        metadata: { $ref: '#/components/schemas/KanbanCompleteMetadata' }
        auto_approve: { type: boolean, default: false }

    KanbanPickRequest:
      type: object
      required: [worker_pid]
      properties:
        worker_pid: { type: integer, minimum: 1 }
        project_id: { type: string, format: uuid, nullable: true }

    KanbanPickResponse:
      type: object
      required: [no_available_task]
      properties:
        task_id: { type: string, format: uuid, nullable: true }
        execution_id: { type: string, format: uuid, nullable: true }
        worktree_path: { type: string, nullable: true }
        no_available_task: { type: boolean }

    KanbanStartRequest:
      type: object
      required: [task_id, execution_id, worker_pid]
      properties:
        task_id: { type: string, format: uuid }
        execution_id: { type: string, format: uuid }
        worker_pid: { type: integer, minimum: 1 }
        claude_code_session_id: { type: string, maxLength: 200, nullable: true }

    KanbanRequestReviewRequest:
      type: object
      required: [task_id, execution_id]
      properties:
        task_id: { type: string, format: uuid }
        execution_id: { type: string, format: uuid }
        note: { type: string, maxLength: 2000, nullable: true }

    KanbanRequestChangeRequest:
      type: object
      required: [task_id, execution_id, reason]
      properties:
        task_id: { type: string, format: uuid }
        execution_id: { type: string, format: uuid }
        reason: { type: string, minLength: 1, maxLength: 2000 }

    KanbanHeartbeatRequest:
      type: object
      required: [task_id, worker_pid]
      properties:
        task_id: { type: string, format: uuid }
        worker_pid: { type: integer, minimum: 1 }

    KanbanKillRequest:
      type: object
      required: [task_id, reason]
      properties:
        task_id: { type: string, format: uuid }
        execution_id: { type: string, format: uuid, nullable: true }
        reason: { type: string, minLength: 1, maxLength: 2000 }

    KanbanResponse:
      type: object
      required: [task_id, lifecycle_stage, action]
      properties:
        task_id: { type: string, format: uuid }
        lifecycle_stage: { type: string }
        dispatch_status: { type: string, nullable: true }
        execution_status: { type: string, nullable: true }
        action:
          type: string
          enum: [picked, started, completed, review_requested, change_requested, heartbeat_ack, killed]

    # ========================================================================
    # MCP トークン管理 (T-A-08)
    # ========================================================================
    McpToken:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        scopes: { type: array, items: { type: string } }
        expires_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        last_used_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    McpTokenCreateResponse:
      allOf:
        - $ref: '#/components/schemas/McpToken'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: "plaintext token (作成直後の 1 度のみ返す。以降は再表示不可)"

    # ========================================================================
    # BYOK API キー (T-A-09)
    # ========================================================================
    ByokKey:
      type: object
      description: BYOK (Bring Your Own Key) API キー。plaintext / encrypted_key は応答に含めない。
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        provider: { type: string, enum: [claude, openai, gemini] }
        label: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ========================================================================
    # 承認待ち
    # ========================================================================
    ApprovalInboxEntry:
      type: object
      description: 承認待ちインボックスエントリ (E-? approval_inbox)。本人のみ可視 (RLS user_id=auth.uid())。
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        type:
          type: string
          enum: [task_approval, phase_approval, knowledge_write, comment_response, scope_change]
        target_type: { type: string }
        target_id: { type: string, format: uuid }
        title: { type: string }
        payload: { type: object }
        status: { type: string, enum: [pending, approved, rejected] }
        resolved_at: { type: string, format: date-time, nullable: true }
        resolution_note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ApprovalDecideRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, enum: [approve, reject] }
        note: { type: string, maxLength: 2000 }

    # ========================================================================
    # クライアント招待 (R-T08)
    # ========================================================================
    ClientSigninRequest:
      type: object
      required: [invitation_token]
      properties:
        invitation_token: { type: string, minLength: 10, maxLength: 200 }
        display_name: { type: string, maxLength: 100, nullable: true }

    ClientProjectRef:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    ClientSigninResponse:
      type: object
      required: [client_access_token, token_type, expires_at, project, scopes]
      properties:
        client_access_token: { type: string, description: "client_portal HS256 JWT (project_id 限定)" }
        token_type: { type: string, enum: [bearer] }
        expires_at: { type: string, format: date-time }
        project: { $ref: '#/components/schemas/ClientProjectRef' }
        scopes:
          type: array
          items: { type: string }

    ClientProjectView:
      type: object
      required: [id, name, scopes]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        scopes:
          type: array
          items: { type: string }
        viewed_as_client_display_name: { type: string, nullable: true }

paths:
  # ==========================================================================
  # auth (T-A-01〜05: signup / signin / Magic Link / リセット / 退会)
  # ==========================================================================
  /auth/signup:
    post:
      tags: [auth]
      summary: ユーザー登録 + 同意取得（F-001 / F-LEGAL-004）
      x-implementation-path: apps/api/src/routes/auth/__init__.py::signup
      x-screen-ids: [S-A01]
      x-feature-ids: [F-001, F-LEGAL-004]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignupRequest' }
      responses:
        '201':
          description: 登録成功（JWT は含まない、signin で発行）
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SignupResponse' }
        '409': { description: email 重複, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422': { description: バリデーション失敗 / 必須 consent 不足, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ==========================================================================
  # impact (F-IMP01 影響範囲解析 / NetworkX)
  # ==========================================================================
  /impact/tasks/{task_id}:
    get:
      tags: [impact]
      summary: タスク影響範囲解析（下流 task 群 / read-only）
      x-implementation-path: apps/api/src/routes/impact/__init__.py::analyze_task_impact
      x-screen-ids: []
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: 解析結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ImpactAnalysisResponse' }
        '404': { description: 不在 or 不可視, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ==========================================================================
  # public (法令ページ + データ削除請求 / 未認証アクセス可)
  # ==========================================================================
  /public/legal-documents:
    get:
      tags: [public]
      summary: 法令ページ一覧（公開・未認証可）
      x-implementation-path: apps/api/src/routes/public/__init__.py::list_legal_documents
      x-screen-ids: [S-PUB01, S-PUB02, S-PUB03]
      parameters:
        - { name: locale, in: query, schema: { type: string } }
      responses:
        '200':
          description: 一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/LegalDocument' } }

  /public/legal-documents/{doc_type}:
    get:
      tags: [public]
      summary: 法令ページ取得（公開・未認証可）
      x-implementation-path: apps/api/src/routes/public/__init__.py::get_legal_document
      x-screen-ids: [S-PUB01, S-PUB02, S-PUB03]
      parameters:
        - { name: doc_type, in: path, required: true, schema: { type: string, enum: [terms_of_service, privacy_policy, tokushoho] } }
        - { name: locale, in: query, schema: { type: string, default: ja } }
      responses:
        '200':
          description: 取得
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LegalDocument' }
        '404': { description: 不在, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /public/data-deletion-requests:
    post:
      tags: [public]
      summary: データ削除請求（本人・要認証 / F-LEGAL-002）
      x-implementation-path: apps/api/src/routes/public/__init__.py::create_data_deletion_request
      x-screen-ids: [S-PUB04]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 2000 }
      responses:
        '201':
          description: 受付
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/DataDeletionRequestResponse' }
        '401': { description: 未認証, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ==========================================================================
  # auth (11 endpoints)
  # ==========================================================================
  /auth/signin:
    post:
      tags: [auth]
      summary: ログイン + 5 回失敗ロック (F-001)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::signin
      x-screen-ids: [S-A01]
      x-rate-limit: 5/min/ip
      x-feature-ids: [F-001]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SigninRequest' }
      responses:
        '200':
          description: サインイン成功 (HS256 JWT 発行)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SigninResponse' }
        '401':
          description: 認証情報不正
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: 5 回失敗で一時ロック or レート上限
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/magic-link/request:
    post:
      tags: [auth]
      summary: Magic Link 送信要求 (常に 202 / enumeration 防止)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::magic_link_request
      x-screen-ids: [S-A01]
      x-feature-ids: [F-001]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MagicLinkRequest' }
      responses:
        '202':
          description: 受付 (email 存在に依らず 202)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/MagicLinkAccepted' }

  /auth/magic-link/verify:
    post:
      tags: [auth]
      summary: Magic Link 検証 → JWT 発行 (refresh token 同時)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::magic_link_verify
      x-screen-ids: [S-A01]
      x-feature-ids: [F-001]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MagicLinkVerifyRequest' }
      responses:
        '200':
          description: 成功 (SigninResponse)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/SigninResponse' }
        '401':
          description: token 無効 / 期限切れ / 既消費
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/oauth/{provider}/redirect-url:
    get:
      tags: [auth]
      summary: OAuth Provider 認可 URL 取得 (CSRF state 含む)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::oauth_redirect
      x-screen-ids: [S-A01]
      x-feature-ids: [F-001]
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string, enum: [google, github] } }
      responses:
        '200':
          description: 認可 URL + state
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/OAuthRedirectResponse' }
        '422':
          description: provider 不正
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/password-reset/request:
    post:
      tags: [auth]
      summary: パスワードリセット要求 (常に 202)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::password_reset_request
      x-screen-ids: [S-A01]
      x-feature-ids: [F-001]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetRequest' }
      responses:
        '202':
          description: 受付
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/PasswordResetAccepted' }

  /auth/password-reset/confirm:
    post:
      tags: [auth]
      summary: パスワードリセット確定 (旧 refresh token 一括失効)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::password_reset_confirm
      x-screen-ids: [S-A01]
      x-feature-ids: [F-001]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetConfirmRequest' }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/PasswordResetConfirmResponse' }
        '401':
          description: token 不正 / 期限切れ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: access_token 再発行 (refresh token rotate)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::auth_refresh
      x-feature-ids: [F-001]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: rotate 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/RefreshResponse' }
        '401':
          description: refresh token 不正 / 期限切れ / 失効済
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/account/delete:
    post:
      tags: [auth]
      summary: 退会 (30 日猶予で soft-delete, F-LEGAL-002)
      x-implementation-path: apps/api/src/routes/auth/__init__.py::account_delete
      x-screen-ids: [S-A03]
      x-feature-ids: [F-001, F-LEGAL-002]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountDeleteRequest' }
      responses:
        '200':
          description: 退会受付 (30 日後にハード削除予定)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AccountDeleteResponse' }
        '401':
          description: password 不一致 or 未認証
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: 既に退会済 / 削除不能
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/account/restore:
    post:
      tags: [auth]
      summary: 退会キャンセル (30 日猶予期間中の復活)
      security: []
      x-implementation-path: apps/api/src/routes/auth/__init__.py::account_restore
      x-screen-ids: [S-A03]
      x-feature-ids: [F-001, F-LEGAL-002]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountRestoreRequest' }
      responses:
        '200':
          description: 復活成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AccountRestoreResponse' }
        '401':
          description: password 不一致
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: 退会記録なし
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: 30 日猶予期間切れ (ハード削除予定 / 既削除)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ==========================================================================
  # contract (T-A-45 API 契約凍結 + screen coverage 検証)
  # ==========================================================================
  /contract/screen-coverage:
    get:
      tags: [contract]
      summary: screen × OpenAPI カバレッジレポート (Gate #9 と同条件)
      x-implementation-path: apps/api/src/routes/contract/__init__.py::screen_coverage
      x-screen-ids: [S-T05]
      responses:
        '200':
          description: カバレッジ詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ScreenCoverageReport' }
        '401':
          description: 未認証
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /contract/freeze-status:
    get:
      tags: [contract]
      summary: API 契約凍結状態
      x-implementation-path: apps/api/src/routes/contract/__init__.py::freeze_status
      x-screen-ids: [S-T05]
      responses:
        '200':
          description: 状態
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/FreezeStatus' }
        '401':
          description: 未認証
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /contract/freeze:
    post:
      tags: [contract]
      summary: API 契約凍結 (admin, screen coverage 100% 必須)
      x-implementation-path: apps/api/src/routes/contract/__init__.py::freeze
      x-screen-ids: [S-T05]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FreezeRequest' }
      responses:
        '200':
          description: 凍結完了
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/FreezeStatus' }
        '401':
          description: 未認証
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: admin 権限なし
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: 既に凍結済
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '412':
          description: screen coverage 100% 未満
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /contract/unfreeze:
    post:
      tags: [contract]
      summary: API 契約凍結解除 (admin)
      x-implementation-path: apps/api/src/routes/contract/__init__.py::unfreeze
      x-screen-ids: [S-T05]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FreezeRequest' }
      responses:
        '200':
          description: 凍結解除完了
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/FreezeStatus' }
        '401':
          description: 未認証
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: admin 権限なし
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: 凍結状態にない
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ==========================================================================
  # workspaces (9 endpoints) - 1 つだけ完全定義、残りは構造同様
  # ==========================================================================
  /workspaces:
    get:
      tags: [workspaces]
      summary: 所属 WS 一覧
      x-implementation-path: apps/api/src/routes/workspaces.py::list
      x-screen-ids: [S-B01]
      responses:
        '200':
          description: WS 一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Workspace' }
    post:
      tags: [workspaces]
      summary: 新規 WS 作成
      x-implementation-path: apps/api/src/routes/workspaces.py::create
      x-screen-ids: [S-A03]
      requestBody:
        required: true
        content:
          application/json:
            schema:
