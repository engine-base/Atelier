        include_history: { type: integer, minimum: 0, maximum: 50, default: 10 }
        rag_account_id: { type: string, format: uuid, nullable: true }

    ChatContextPreviewRequest:
      type: object
      required: [user_message]
      properties:
        user_message: { type: string, minLength: 1, maxLength: 20000 }
        include_history: { type: integer, minimum: 0, maximum: 50, default: 10 }
        rag_account_id: { type: string, format: uuid, nullable: true }

    ChatContextPreviewResponse:
      type: object
      required: [system_prompt, history_count, rag_hit_ids]
      properties:
        system_prompt: { type: string }
        history_count: { type: integer, minimum: 0 }
        rag_hit_ids:
          type: array
          items: { type: string, format: uuid }

    # ========================================================================
    # Hermes 互換
    # ========================================================================
    KanbanCompleteRequest:
      type: object
      required: [task_id, summary, metadata]
      properties:
        task_id: { type: string, format: uuid }
        summary: { type: string }
        metadata:
          type: object
          required: [score, ac_pass_rate, test_pass_rate, verification_score, retry_count]
          properties:
            score: { type: number, minimum: 0, maximum: 1 }
            ac_pass_rate: { type: number }
            test_pass_rate: { type: number }
            verification_score: { type: number }
            files_changed: { type: array, items: { type: string } }
            retry_count: { type: integer }

    # ========================================================================
    # MCP トークン管理 (T-A-08)
    # ========================================================================
    McpToken:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        scopes: { type: array, items: { type: string } }
        expires_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        last_used_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    McpTokenCreateResponse:
      allOf:
        - $ref: '#/components/schemas/McpToken'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: "plaintext token (作成直後の 1 度のみ返す。以降は再表示不可)"

    # ========================================================================
    # BYOK API キー (T-A-09)
    # ========================================================================
    ByokKey:
      type: object
      description: BYOK (Bring Your Own Key) API キー。plaintext / encrypted_key は応答に含めない。
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        provider: { type: string, enum: [claude, openai, gemini] }
        label: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ========================================================================
    # 承認待ち
    # ========================================================================
    ApprovalInboxEntry:
      type: object
      description: 承認待ちインボックスエントリ (E-? approval_inbox)。本人のみ可視 (RLS user_id=auth.uid())。
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        type:
          type: string
          enum: [task_approval, phase_approval, knowledge_write, comment_response, scope_change]
        target_type: { type: string }
        target_id: { type: string, format: uuid }
        title: { type: string }
        payload: { type: object }
        status: { type: string, enum: [pending, approved, rejected] }
        resolved_at: { type: string, format: date-time, nullable: true }
        resolution_note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ApprovalDecideRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, enum: [approve, reject] }
        note: { type: string, maxLength: 2000 }

    # ========================================================================
    # クライアント招待 (R-T08)
    # ========================================================================
    ClientSigninRequest:
      type: object
      required: [invitation_token]
      properties:
        invitation_token: { type: string }
        display_name: { type: string }

    ClientSigninResponse:
      type: object
      properties:
        client_access_token: { type: string }
        project:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
        expires_at: { type: string, format: date-time }

